        <h1>腐乳空心菜</h1>
    </header>
    <div class="content">
        <p>空心菜、油、腐乳、蒜。</p>
<p>口味咸。</p>
<span id="continue-reading"></span><h2 id="pai-suan">拍蒜</h2>
<p>拍一两颗蒜瓣。</p>
<h2 id="fu-ru-jiang-zhi">腐乳酱汁</h2>
<p>一块腐乳打碎，加点水。</p>
<h2 id="chao-kong-xin-cai">炒空心菜</h2>
<p>中火。
热油下蒜瓣爆香，下空心菜，炒至菜叶微皱。</p>
<h2 id="xia-fu-ru">下腐乳</h2>
<p>小火。
下入腐乳酱汁，炒至空心菜茎变软，出锅。</p>
